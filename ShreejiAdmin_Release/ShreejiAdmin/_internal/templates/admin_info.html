{% extends 'base.html' %}

{% block title %}Admin Access - Shreeji Auto Services{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <img src="{{ url_for('static', filename='images/logo1.png') }}"
         class="auth-logo"
         alt="Logo">

    <h2 class="auth-title">
      Admin Access
    </h2>

    <p class="auth-subtitle">
      Admin tools are available in the desktop admin panel. Please open ShreejiAdmin on the service desk computer.
    </p>

    <a href="{{ url_for('auth.login') }}" class="btn btn-primary w-100 auth-btn">
      Back to Login
    </a>
  </div>
</div>
{% endblock %}
