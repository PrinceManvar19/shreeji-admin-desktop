{% extends 'base.html' %}
{% block title %}Find Customer ID{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <img src="{{ url_for('static', filename='images/logo1.png') }}"
         class="auth-logo"
         alt="Logo">

    <h2 class="auth-title">
      Find Your <span>Customer ID</span>
    </h2>

    <p class="auth-subtitle">
      Enter your details to recover your Customer ID
    </p>

    <form method="POST" class="auth-form">
      <label class="form-label" for="findName">Full Name *</label>
      <input type="text" class="form-control auth-input" id="findName" name="name" placeholder="Rahul Patel" required>

      <label class="form-label" for="findPhone">Phone Number *</label>
      <input type="tel" class="form-control auth-input" id="findPhone" name="phone" placeholder="9876543210" required>

      <label class="form-label" for="findVehicle">Vehicle Number *</label>
      <input type="text" class="form-control auth-input" id="findVehicle" name="vehicle" placeholder="GJ01AB1234" required>

      <button type="submit" class="btn btn-primary w-100 auth-btn">
        Find My ID
      </button>
    </form>

    <a href="/login" class="auth-link">&larr; Back to Login</a>
  </div>
</div>
{% endblock %}
