{% extends 'base.html' %}

{% block title %}Register - Shreeji Auto Services{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <img src="{{ url_for('static', filename='images/logo1.png') }}"
         class="auth-logo"
         alt="Logo">

    <h2 class="auth-title">
      Create Account at <span>Shreeji</span>
    </h2>

    <p class="auth-subtitle">
      Register once and use your phone number to login
    </p>

    <form method="POST" action="/register" class="auth-form" id="registerForm">
      <label class="form-label" for="regName">Full Name *</label>
      <input type="text" class="form-control auth-input" id="regName" name="name" placeholder="Rahul Patel" required data-trim>
      <div class="invalid-feedback" id="regNameError" style="display:none; color:#dc3545; font-size:0.875rem; margin-top:0.25rem;"></div>

      <label class="form-label" for="regPhone">Phone Number *</label>
      <input type="tel" class="form-control auth-input" id="regPhone" name="phone" placeholder="9876543210" required data-normalize="phone">
      <div class="invalid-feedback" id="regPhoneError" style="display:none; color:#dc3545; font-size:0.875rem; margin-top:0.25rem;"></div>

      <label class="form-label" for="regVehicle">Vehicle Number *</label>
      <input type="text" class="form-control auth-input" id="regVehicle" name="vehicle" placeholder="MH 04 XX 1234" required data-normalize="plate">
      <div class="invalid-feedback" id="regVehicleError" style="display:none; color:#dc3545; font-size:0.875rem; margin-top:0.25rem;"></div>

      <button type="submit" class="btn btn-primary w-100 auth-btn" data-loading-submit="true" data-loading-text="Creating Account...">
        Create My Account
      </button>
    </form>


    <a href="/login" class="auth-link">Already have account? Login →</a>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  const registerForm = document.getElementById('registerForm');
  const nameInput = document.getElementById('regName');
  const phoneInput = document.getElementById('regPhone');
  const vehicleInput = document.getElementById('regVehicle');
  const nameError = document.getElementById('regNameError');
  const phoneError = document.getElementById('regPhoneError');
  const vehicleError = document.getElementById('regVehicleError');

  function clearErrors() {
    nameError.style.display = 'none'; nameError.textContent = '';
    phoneError.style.display = 'none'; phoneError.textContent = '';
    vehicleError.style.display = 'none'; vehicleError.textContent = '';
  }

  registerForm.addEventListener('submit', function(event) {
    clearErrors();

    const name = nameInput.value.trim();
    const phone = phoneInput.value.replace(/\D/g, '');
    const vehicle = vehicleInput.value.trim();

    let hasError = false;

    if (!name) {
      nameError.textContent = 'Please enter your full name';
      nameError.style.display = 'block';
      hasError = true;
    }

    if (!phone) {
      phoneError.textContent = 'Please enter your phone number';
      phoneError.style.display = 'block';
      hasError = true;
    } else if (phone.length !== 10) {
      phoneError.textContent = 'Phone number must be exactly 10 digits';
      phoneError.style.display = 'block';
      hasError = true;
    }

    if (!vehicle) {
      vehicleError.textContent = 'Please enter your vehicle number';
      vehicleError.style.display = 'block';
      hasError = true;
    } else if (!/^[A-Z0-9\s-]{4,15}$/.test(vehicle)) {
      vehicleError.textContent = 'Invalid vehicle number format';
      vehicleError.style.display = 'block';
      hasError = true;
    }

    if (hasError) {
      event.preventDefault();
      setLoading(event.submitter, false);
      return;
    }
  });
});
</script>
{% endblock %}
